<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Pro | Victory Academy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <button id="searchBtn">Search</button>
        </div>

        <div class="weather-info">
            <h2 id="cityName">--</h2>
            <img id="weatherIcon" src="" alt="">
            <p id="desc">Waiting for search...</p>
            <h1 id="temp">--°C</h1>
        </div>

        <div class="details">
            <div class="col">
                <p>Humidity</p>
                <p id="humidity">--%</p>
            </div>
            <div class="col">
                <p>Wind Speed</p>
                <p id="wind">-- km/h</p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
