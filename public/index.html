<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Pro | Jibran</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="datetime-container">
            <p id="date">-- -- ----</p>
            <h2 id="time">00:00:00</h2>
        </div>

        <div class="container">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Search city...">
                <button id="searchBtn">Go</button>
            </div>

            <div class="weather-info">
                <h2 id="cityName">SkyCast</h2>
                <img id="weatherIcon" src="" alt="">
                <p id="desc">Enter a location</p>
                <h1 id="temp">--°C</h1>
            </div>

            <div class="details">
                <div class="col">
                    <p>Humidity</p>
                    <p id="humidity">--%</p>
                </div>
                <div class="col">
                    <p>Wind</p>
                    <p id="wind">-- km/h</p>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
